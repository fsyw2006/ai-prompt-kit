name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Smoke test CLI
        shell: bash
        run: |
          data_file="$RUNNER_TEMP/prompts.json"
          export_file="$RUNNER_TEMP/exported-prompts.json"
          import_data_file="$RUNNER_TEMP/imported-prompts.json"

          ai-prompt-kit --help
          ai-prompt-kit --data "$data_file" add "Code reviewer" \
            --body "Review Python code and output a Markdown table with bugs and missing tests." \
            --auto-tags
          ai-prompt-kit --data "$data_file" search codng --fuzzy
          ai-prompt-kit --data "$data_file" quality
          ai-prompt-kit --data "$data_file" export "$export_file" --format json
          ai-prompt-kit --data "$import_data_file" import "$export_file" --format json
